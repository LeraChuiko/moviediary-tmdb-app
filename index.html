<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MovieDiary - WBS</title>
    <!----- Tailwind CSS verbinden ----->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="google-site-verification" content="v42o62IVgDPjkaCDHqSEURSy56QS7Z8OJawqwZ7dVmA" />
  </head>
  <body class="bg-zinc-950 text-white min-h-screen font-sans">
    <!----- NAVBAR ----->
    <header
      class="p-5 flex justify-between items-center border-b border-zinc-800"
    >
      <div class="text-green-500 font-bold text-3xl tracking-wider">
        MOVIE DIARY
      </div>
      <nav class="flex gap-6 items-center">
        <!----- Link zur Journalseite ----->
        <a href="journal.html" class="hover:text-red-500 transition"
          >Mein Journal</a
        >
      </nav>
    </header>

    <main class="container mx-auto px-4 py-8">
      <!----- HERO SECTION----->
      <section
        class="relative h-96 w-full overflow-hidden rounded-2xl border border-zinc-800 flex flex-col justify-center items-center text-center px-4"
      >
        <img
          src="img/hero.jpg"
          alt="Hero Background"
          class="absolute inset-0 w-full h-full object-cover object-center z-0"
        />
        <div
          class="absolute inset-0 bg-black/60 bg-gradient-to-t from-zinc-950 via-zinc-950/40 to-transparent z-10"
        ></div>

        <!-- Img shadow -->
        <div class="relative z-20 max-w-2xl w-full flex flex-col items-center">
          <h1
            class="text-3xl md:text-5xl font-extrabold text-white mb-3 tracking-tight"
          >
            Dein persönliches Filmjournal
          </h1>
          <p class="text-zinc-300 text-sm md:text-xl mb-8">
            Finde deine Lieblingsfilme, füge sie zum Journal hinzu und halte
            deine Momente fest.
          </p>

          <!----- Search Form ----->
          <form
            id="search-form"
            class="w-full flex flex-col sm:flex-row gap-2 sm:gap-0 items-stretch max-w-xl"
          >
            <input
              type="text"
              id="search-input"
              placeholder="Welchen Film suchst du?"
              class="w-full px-5 py-4 bg-black/40 text-white placeholder-zinc-400 border border-zinc-500 rounded-md sm:rounded-r-none focus:outline-none focus:border-white transition text-base"
            />
            <button
              type="submit"
              class="bg-blue-600 text-white font-bold text-lg px-8 py-4 rounded-md sm:rounded-l-none hover:bg-red-700 transition flex items-center justify-center gap-2 whitespace-nowrap"
            >
              Suchen <span class="text-xl">❯</span>
            </button>
          </form>
        </div>
      </section>

      <!-----FILMS GRID ----->
      <section class="mt-10">
        <h2 class="text-2xl font-semibold mb-6">Populäre Filme</h2>

        <div
          id="movies-grid"
          class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6"
        >
          <!----- Filmkarten werden hier mithilfe von JavaScript erstellt ----->
          <!----- Filmkart template, später weg machen-->
          <div
            class="group relative bg-zinc-900 rounded-lg overflow-hidden shadow-lg transition-transform duration-300 hover:scale-105 flex flex-col justify-between"
          >
          
            <div
              class="relative aspect-[2/3] w-full bg-zinc-800 flex items-center justify-center border-b border-zinc-800"
            >
             
              <span
                class="text-zinc-500 text-xs font-medium uppercase tracking-wider"
                >Filmposter</span
              >

              <span
                class="absolute top-2 left-2 bg-black/75 text-yellow-500 font-bold text-xs px-2 py-1 rounded border border-zinc-700 z-10"
              >
                ★ 8.2
              </span>
            </div>

  
            <div class="p-4 flex flex-col justify-between flex-grow">
              <div class="flex justify-between items-start gap-2 mb-2">
                <h3
                  class="font-bold text-sm md:text-base text-zinc-100 line-clamp-2 group-hover:text-red-500 transition"
                >
                  Under Paris
                </h3>

                <!----- ★ ----->
                <button
                  data-movie-id="12345"
                  class="favorite-btn text-zinc-500 hover:text-yellow-400 text-xl transition-colors focus:outline-none"
                  title="Zum Journal hinzufügen"
                >
                  ★
                </button>
              </div>

              
              <span class="text-xs text-zinc-400">2024</span>
            </div>
          </div>

        </div>
      </section>
    </main>

    <!----- JS Main ----->
    <script src="main.js"></script>
  </body>
</html>
